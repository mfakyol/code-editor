# Preserve the original scheme when we sit behind the host nginx (which
# terminates TLS). If it already sent X-Forwarded-Proto, keep it (https);
# otherwise fall back to our own scheme. This lets the backend see the request
# was HTTPS (Express "trust proxy" -> Secure session cookie).
map $http_x_forwarded_proto $fwd_proto {
  default $scheme;
  "~.+"   $http_x_forwarded_proto;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 5m;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: unknown paths fall back to index.html (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API requests to the backend service (compose network: "server").
  location /api/ {
    proxy_pass http://server:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
